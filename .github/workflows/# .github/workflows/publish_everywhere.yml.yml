name: Publish to NuGet & GitHub

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Разрешаем запись в GitHub Packages

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore DSpyNet/DSpyNet.csproj

    - name: Build
      run: dotnet build DSpyNet/DSpyNet.csproj --configuration Release --no-restore

    - name: Pack
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "Packing version: $VERSION"
          dotnet pack DSpyNet/DSpyNet.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=$VERSION
        else
          echo "Packing version from csproj"
          dotnet pack DSpyNet/DSpyNet.csproj --configuration Release --no-build --output ./nupkgs
        fi

    # Шаг 1: Публикация на глобальный NuGet.org
    - name: Push to NuGet.org
      run: |
        dotnet nuget push ./nupkgs/*.nupkg \
          --source https://api.nuget.org/v3/index.json \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --skip-duplicate

    # Шаг 2: Публикация в GitHub Packages
    - name: Push to GitHub Packages
      run: |
        dotnet nuget push ./nupkgs/*.nupkg \
          --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
          --api-key ${{ secrets.GITHUB_TOKEN }} \
          --skip-duplicate