name: Publish to NuGet

on:
  release:
    types: [published]
  workflow_dispatch: # Позволяет запустить вручную

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'

    - name: Restore dependencies
      run: dotnet restore DSpyNet/DSpyNet.csproj

    - name: Build
      run: dotnet build DSpyNet/DSpyNet.csproj --configuration Release --no-restore

    # Если есть тесты, их стоит прогнать перед публикацией
    # - name: Test
    #   run: dotnet test DSpyNet.Tests/DSpyNet.Tests.csproj --configuration Release --no-build

    - name: Pack
      # Используем версию из тега релиза (например, v1.0.0 -> 1.0.0) если запуск по релизу
      # Или берем из csproj, если запуск ручной
      run: |
        if [ "${{ github.event_name }}" = "release" ]; then
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}" # Удаляем префикс 'v' если есть
          dotnet pack DSpyNet/DSpyNet.csproj --configuration Release --no-build --output ./nupkgs /p:PackageVersion=$VERSION
        else
          dotnet pack DSpyNet/DSpyNet.csproj --configuration Release --no-build --output ./nupkgs
        fi

    - name: Push to NuGet
      run: |
        dotnet nuget push ./nupkgs/*.nupkg \
          --api-key ${{ secrets.NUGET_API_KEY }} \
          --source https://api.nuget.org/v3/index.json \
          --skip-duplicate